services:
  # Flask Web Service - Fixed App
  - type: web
    name: trig-verifier
    env: python
    plan: free
    buildCommand: bash render_build.sh && pip install -r requirements.txt
    startCommand: python app_fixed.py
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 8080
